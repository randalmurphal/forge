id: workflow-built-in-refine-prompt
name: refine-prompt
description: Evaluate and refine a prompt collaboratively before human approval.
builtIn: true
createdAt: "2026-04-05T00:00:00.000Z"
updatedAt: "2026-04-05T00:00:00.000Z"
phases:
  - id: phase-built-in-refine-prompt-deliberate
    name: deliberate
    type: multi-agent
    deliberation:
      participants:
        - role: evaluator
          agent:
            prompt: evaluator
            model:
              provider: codex
              model: gpt-5.4
            output:
              type: channel
        - role: refiner
          agent:
            prompt: refiner
            model:
              provider: codex
              model: gpt-5.4
            output:
              type: channel
      maxTurns: 20
    gate:
      after: auto-continue
      onFail: stop
      maxRetries: 0
  - id: phase-built-in-refine-prompt-synthesize
    name: synthesize
    type: single-agent
    agent:
      prompt: synthesize
      model:
        provider: codex
        model: gpt-5.4
      output:
        type: conversation
    inputFrom: deliberate.channel
    gate:
      after: human-approval
      onFail: retry
      maxRetries: 3
