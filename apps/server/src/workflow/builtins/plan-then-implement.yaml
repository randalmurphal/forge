id: workflow-built-in-plan-then-implement
name: plan-then-implement
description: Review the plan first, implement from the approved plan, then run a code review.
builtIn: true
createdAt: "2026-04-05T00:00:00.000Z"
updatedAt: "2026-04-05T00:00:00.000Z"
phases:
  - id: phase-built-in-plan-then-implement-plan-review
    name: plan-review
    type: multi-agent
    deliberation:
      participants:
        - role: advocate
          agent:
            prompt: advocate
            output:
              type: channel
        - role: interrogator
          agent:
            prompt: interrogator
            output:
              type: channel
      maxTurns: 20
    gate:
      after: human-approval
      onFail: retry
      maxRetries: 3
  - id: phase-built-in-plan-then-implement-implement
    name: implement
    type: single-agent
    agent:
      prompt: implement
      output:
        type: conversation
    inputFrom: plan-review.channel
    gate:
      after: quality-checks
      qualityChecks:
        - check: test
          required: true
        - check: lint
          required: true
        - check: typecheck
          required: true
      onFail: retry
      maxRetries: 5
  - id: phase-built-in-plan-then-implement-code-review
    name: code-review
    type: multi-agent
    deliberation:
      participants:
        - role: scrutinizer
          agent:
            prompt: scrutinizer
            output:
              type: channel
        - role: defender
          agent:
            prompt: defender
            output:
              type: channel
      maxTurns: 20
    gate:
      after: human-approval
      onFail: go-back-to
      retryPhase: implement
      maxRetries: 3
