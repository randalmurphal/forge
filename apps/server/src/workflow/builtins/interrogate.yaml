id: workflow-built-in-interrogate
name: interrogate
description: Run an advocate versus interrogator plan review, then synthesize the findings.
builtIn: true
createdAt: "2026-04-05T00:00:00.000Z"
updatedAt: "2026-04-05T00:00:00.000Z"
phases:
  - id: phase-built-in-interrogate
    name: interrogate
    type: multi-agent
    deliberation:
      participants:
        - role: advocate
          agent:
            prompt: advocate
            model:
              provider: codex
              model: gpt-5.4
            output:
              type: channel
        - role: interrogator
          agent:
            prompt: interrogator
            model:
              provider: codex
              model: gpt-5.4
            output:
              type: channel
      maxTurns: 20
    gate:
      after: auto-continue
      onFail: stop
      maxRetries: 0
  - id: phase-built-in-interrogate-synthesize
    name: synthesize
    type: single-agent
    agent:
      prompt: synthesize
      model:
        provider: codex
        model: gpt-5.4
      output:
        type: conversation
    inputFrom: interrogate.channel
    gate:
      after: human-approval
      onFail: retry
      maxRetries: 3
