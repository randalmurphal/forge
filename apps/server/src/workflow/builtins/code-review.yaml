id: workflow-built-in-code-review
name: code-review
description: Parallel review followed by cross-examination and human presentation.
builtIn: true
createdAt: "2026-04-05T00:00:00.000Z"
updatedAt: "2026-04-05T00:00:00.000Z"
phases:
  - id: phase-built-in-code-review-independent
    name: independent-review
    type: multi-agent
    sandboxMode: read-only
    deliberation:
      participants:
        - role: scrutinizer
          agent:
            prompt: scrutinizer
            model:
              provider: codex
              model: gpt-5.4
            output:
              type: conversation
        - role: defender
          agent:
            prompt: defender
            model:
              provider: codex
              model: gpt-5.4
            output:
              type: conversation
      maxTurns: 20
    gate:
      after: auto-continue
      onFail: stop
      maxRetries: 0
  - id: phase-built-in-code-review-cross-examine
    name: cross-examine
    type: multi-agent
    inputFrom:
      SCRUTINIZER_FINDINGS: independent-review.output:scrutinizer
      DEFENDER_FINDINGS: independent-review.output:defender
    deliberation:
      participants:
        - role: scrutinizer
          agent:
            prompt: scrutinizer
            model:
              provider: codex
              model: gpt-5.4
            output:
              type: channel
        - role: defender
          agent:
            prompt: defender
            model:
              provider: codex
              model: gpt-5.4
            output:
              type: channel
      maxTurns: 20
    gate:
      after: auto-continue
      onFail: stop
      maxRetries: 0
  - id: phase-built-in-code-review-present-findings
    name: present-findings
    type: human
    inputFrom:
      REVIEW_FINDINGS: cross-examine.channel
    gate:
      after: human-approval
      onFail: stop
      maxRetries: 0
